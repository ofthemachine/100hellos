# fraglet-entrypoint configuration for Factor container

fragletTempPath: /FRAGLET

injection:
  codePath: /hello-world/hello-world.factor
  match_start: "! BEGIN_FRAGLET"
  match_end: "! END_FRAGLET"

guide: /guide.md

execution:
  path: factor /hello-world/hello-world.factor
  makeExecutable: false
